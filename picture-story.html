<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Picture Story Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;700&family=Noto+Serif+KR:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #eef6ff; --surface: #ffffff; --card: #f5eeff; --border: #c4a8e8;
    --accent: #7c3aed; --accent2: #f5c400; --accent3: #38bdf8;
    --text: #1e1b4b; --muted: #6b7280; --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: linear-gradient(135deg, #dbeafe 0%, #ede9fe 50%, #fef9c3 100%);
    color: var(--text); font-family: 'Inter', sans-serif;
    min-height: 100vh; padding: 40px 20px 80px; transition: background 0.7s ease;
  }

  .lang-toggle {
    position: fixed; top: 20px; right: 24px; display: flex;
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 50px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,.14);
    z-index: 999; transition: border-color 0.5s, background 0.5s;
  }

  .lang-btn {
    background: transparent; border: none; cursor: pointer;
    font-family: inherit; font-size: 0.78rem; font-weight: 700;
    letter-spacing: .04em; padding: 8px 18px; color: var(--muted);
    transition: background .2s, color .2s;
  }

  .lang-btn:hover { color: var(--accent); }
  .lang-btn.active { background: var(--accent); color: #fff; }

  header { text-align: center; margin-bottom: 48px; padding-top: 8px; }

  header h1 {
    font-family: 'Playfair Display', serif; font-size: 2.4rem; font-weight: 700;
    background: linear-gradient(135deg, var(--accent3), var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 8px; transition: font-family 0.3s;
  }

  header p { color: var(--muted); font-size: 0.95rem; font-weight: 300; }
  .container { max-width: 860px; margin: 0 auto; }

  .api-section {
    background: var(--surface); border: 2px solid var(--accent);
    border-radius: var(--radius); padding: 24px; margin-bottom: 28px;
    box-shadow: 0 4px 20px rgba(124,58,237,.1);
    transition: border-color 0.5s, background 0.5s, box-shadow 0.5s;
  }

  label {
    display: block; font-size: 0.82rem; font-weight: 500;
    color: var(--accent) !important; text-transform: uppercase;
    letter-spacing: .08em; margin-bottom: 8px;
  }

  input[type="password"] {
    width: 100%; background: var(--card); border: 1.5px solid var(--border);
    border-radius: 10px; color: var(--text); font-family: inherit;
    font-size: 0.95rem; padding: 12px 16px; outline: none;
    transition: border-color .3s, background .4s, color .4s;
  }

  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,58,237,.15); }

  .emotion-section {
    background: var(--surface); border: 2px solid var(--accent3);
    border-radius: var(--radius); padding: 24px; margin-bottom: 28px;
    box-shadow: 0 4px 20px rgba(56,189,248,.12);
    transition: border-color 0.5s, background 0.5s, box-shadow 0.5s;
  }

  .emotion-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }

  .emotion-btn {
    background: var(--card); border: 2px solid var(--border);
    border-radius: 50px; color: var(--text); cursor: pointer;
    font-family: inherit; font-size: 0.9rem; padding: 8px 20px; transition: all .3s;
  }

  .emotion-btn:hover { border-color: var(--accent3); background: var(--border); }

  .emotion-btn.active {
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    border-color: var(--accent); color: #fff; font-weight: 700;
    transform: scale(1.05); box-shadow: 0 4px 14px rgba(124,58,237,.3);
  }

  .upload-section {
    background: var(--surface); border: 2px solid var(--accent2);
    border-radius: var(--radius); padding: 24px; margin-bottom: 28px;
    box-shadow: 0 4px 20px rgba(245,196,0,.12);
    transition: border-color 0.5s, background 0.5s, box-shadow 0.5s;
  }

  .upload-zone {
    border: 2px dashed var(--accent); border-radius: 12px;
    cursor: pointer; padding: 36px; text-align: center; transition: all .3s;
    margin-top: 14px; background: var(--card);
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent3); background: rgba(56,189,248,.07);
  }

  .upload-zone input { display: none; }
  .upload-icon { font-size: 2.4rem; margin-bottom: 10px; }
  .upload-zone p { color: var(--muted); font-size: 0.9rem; }
  .upload-zone strong { color: var(--accent); font-weight: 700; }

  .preview-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px; margin-top: 18px;
  }

  .preview-item {
    position: relative; border-radius: 10px; overflow: hidden; aspect-ratio: 1;
    border: 2px solid #a78bfa; animation: popIn .3s ease;
    box-shadow: 0 2px 8px rgba(124,58,237,.15);
  }

  @keyframes popIn {
    from { opacity:0; transform: scale(.85); }
    to   { opacity:1; transform: scale(1); }
  }

  .preview-item img { width:100%; height:100%; object-fit:cover; }

  .preview-item .order-badge {
    position: absolute; top:6px; left:6px;
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    color:#fff; border-radius:50%; width:24px; height:24px;
    display:flex; align-items:center; justify-content:center;
    font-size:0.75rem; font-weight:700;
  }

  .preview-item .remove-btn {
    position: absolute; top:6px; right:6px; background: rgba(0,0,0,.6);
    border:none; border-radius:50%; color:#fff; cursor:pointer;
    font-size:1rem; width:24px; height:24px;
    display:flex; align-items:center; justify-content:center;
  }

  .preview-item .remove-btn:hover { background: var(--accent); }

  .generate-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent3) 0%, var(--accent) 60%, #a21caf 100%);
    border: none; border-radius: var(--radius); color: #fff; cursor: pointer;
    font-family: inherit; font-size: 1.05rem; font-weight: 700;
    letter-spacing: .04em; padding: 18px; transition: all .2s; margin-bottom: 28px;
    box-shadow: 0 6px 24px rgba(124,58,237,.3);
  }

  .generate-btn:hover:not(:disabled) {
    transform: translateY(-2px); box-shadow: 0 12px 36px rgba(124,58,237,.45);
  }

  .generate-btn:disabled { opacity:.45; cursor:not-allowed; }

  .output-section {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: var(--radius); padding: 32px; display: none;
    box-shadow: 0 8px 32px rgba(124,58,237,.12);
    transition: border-color 0.5s, background 0.5s, box-shadow 0.5s;
  }

  .output-section.visible { display:block; animation: fadeUp .4s ease; }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .output-header { display:flex; align-items:center; gap:12px; margin-bottom:22px; flex-wrap:wrap; }

  .emotion-tag {
    background:#fefce8; border:2px solid var(--accent2); border-radius:50px;
    color:#92400e; font-size:0.82rem; font-weight:600; padding:4px 14px;
  }

  .story-text {
    font-family: 'Playfair Display', serif; font-size: 1.05rem;
    line-height: 1.95; color: var(--text); white-space: pre-wrap;
    transition: font-family 0.4s, color 0.4s;
  }

  .spinner {
    width:40px; height:40px; border:3px solid #e0e7ff;
    border-top-color:var(--accent); border-radius:50%;
    animation:spin .8s linear infinite; margin:32px auto; display:none;
  }

  .spinner.visible { display:block; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .status-msg { text-align:center; color:var(--muted); font-size:0.9rem; display:none; margin-bottom:12px; }
  .status-msg.visible { display:block; }

  .section-title { font-size:0.85rem; font-weight:700; color:var(--accent); letter-spacing:.1em; margin-bottom:6px; }
</style>
</head>
<body>

<div class="lang-toggle">
  <button class="lang-btn active" data-lang="en">&#x1F1FA;&#x1F1F8; EN</button>
  <button class="lang-btn" data-lang="ko">&#x1F1F0;&#x1F1F7; KO</button>
</div>

<div class="container">
  <header>
    <h1 id="headerTitle">&#x1F4D6; Picture Story Generator</h1>
    <p id="headerSubtitle">Exercise 3 &mdash; Generate short stories based on pictures and emotions</p>
  </header>

  <div class="api-section">
    <label id="apiLabel">&#x1F511; OpenAI API Key</label>
    <input type="password" id="apiKey" placeholder="sk-..." />
  </div>

  <div class="emotion-section">
    <div class="section-title" id="emotionSectionTitle">Select Emotion</div>
    <div class="emotion-grid" id="emotionGrid"></div>
  </div>

  <div class="upload-section">
    <div class="section-title" id="uploadSectionTitle">Upload Pictures</div>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*" multiple />
      <div class="upload-icon">&#x1F5BC;&#xFE0F;</div>
      <p id="uploadHint1"><strong>Click</strong> or drag and drop images here</p>
      <p id="uploadHint2">Select multiple images in order (JPG, PNG, WEBP)</p>
    </div>
    <div class="preview-grid" id="previewGrid"></div>
  </div>

  <button class="generate-btn" id="generateBtn" disabled>&#x2728; Generate Story</button>

  <div class="spinner" id="spinner"></div>
  <div class="status-msg" id="statusMsg">Analyzing pictures and generating your story...</div>

  <div class="output-section" id="outputSection">
    <div class="output-header">
      <span style="font-size:1.3rem">&#x1F4DC;</span>
      <h2 id="outputTitle" style="font-family:'Playfair Display',serif;font-size:1.2rem">Generated Story</h2>
      <span class="emotion-tag" id="emotionTag"></span>
    </div>
    <p class="story-text" id="storyText"></p>
    <div id="charCount" style="margin-top:16px;text-align:right;font-size:0.82rem;color:var(--muted);"></div>
  </div>
</div>

<script>

var selectedEmotion = '';

var strings = {
  en: {

    loadingMsg:   '그림을 분석하고 이야기를 생성하는 중…',

    headerFont:   "'Noto Serif KR', serif",

var emotions = [

  {key:'Sad',         en:'&#x1F622; Sad',           ko:'&#x1F622; 슬픈'},

  {key:'Excited',     en:'&#x1F970; Excited',       ko:'&#x1F970; 설레는'},
  {key:'Mysterious',  en:'&#x1F30C; Mysterious',    ko:'&#x1F30C; 신비로운'},
  {key:'Warm',        en:'&#x1F338; Warm',          ko:'&#x1F338; 따뜻한'},
  {key:'Bittersweet', en:'&#x1F342; Bittersweet',   ko:'&#x1F342; 슬프고 아름다운'},
  {key:'Cheerful',    en:'&#x1F604; Cheerful',      ko:'&#x1F604; 유콘한'},
  {key:'Scary',       en:'&#x1F631; Scary',         ko:'&#x1F631; 무서운'},
  {key:'Fantastical', en:'&#x2728; Fantastical',    ko:'&#x2728; 환상적인'},
  {key:'Lonely',      en:'&#x1F319; Lonely',        ko:'&#x1F319; 외로운'},
  {key:'Nostalgic',   en:'&#x1F54A;&#xFE0F; Nostalgic', ko:'&#x1F54A;&#xFE0F; 그리운'},
  {key:'Brave',       en:'&#x1F981; Brave',         ko:'&#x1F981; 용감한'},
  {key:'Peaceful',    en:'&#x1F33F; Peaceful',      ko:'&#x1F33F; 평화로운'},
  {key:'Dreamlike',   en:'&#x1F30A; Dreamlike',     ko:'&#x1F30A; 몬환적인'},

  {key:'Thrilling',   en:'&#x1F3A2; Thrilling',     ko:'&#x1F3A2; 짜릿한'},
  {key:'Furious',     en:'&#x1F30B; Furious',       ko:'&#x1F30B; 분노한'},
  {key:'Heartbroken', en:'&#x1F494; Heartbroken',   ko:'&#x1F494; 상처받은'},
  {key:'Hopeful',     en:'&#x1F98B; Hopeful',       ko:'&#x1F98B; 희망찬'},
  {key:'Dramatic',    en:'&#x1F3AD; Dramatic',      ko:'&#x1F3AD; 극적인'},
  {key:'Melancholic', en:'&#x1F327;&#xFE0F; Melancholic', ko:'&#x1F327;&#xFE0F; 우울한'},

var tones = {
  Happy:       {en:'Use a bright, lively, and hopeful tone with positive expressions and vivid, energetic descriptions.',
                ko:'밝고 활기차며 희망적인 어조로, 꺍정적인 표현과 생동감 있는 묘사를 사용하세요.'},
  Sad:         {en:'Use a quiet, melancholic tone that conveys emotional depth and a sense of longing.',
                ko:'잌잌하고 애잔한 어조로, 감정의 깊이와 그리움을 담아 표현하세요.'},
  Suspenseful: {en:'Use short, punchy sentences to build tension and create a breathless sense of suspense.',
                ko:'짧고 빠른 문장으로 긴박감을 높이고, 독자가 숨을 참게 만드는 서스펜스를 조성하세요.'},

  Mysterious:  {en:'Use a dreamy, enigmatic tone that conveys wonder and awe toward the unknown.',
                ko:'몬환적이고 수수께끼 같은 어조로, 알 수 없는 무언가에 대한 경이로움을 담아 표현하세요.'},
  Warm:        {en:'Use a cozy, affectionate tone that captures the small joys of everyday life and the warmth between people.',
                ko:'포근하고 다정한 어조로, 일상의 소소한 행복과 사람 사이의 온기를 담아 표현하세요.'},
  Bittersweet: {en:'Use a lyrical tone tinged with beautiful sorrow, portraying the beauty found in loss and memory.',

  Hopeful:     {en:'Use a tender, luminous tone that finds the first light of possibility in the smallest of moments, like dawn quietly breaking through clouds.',

function getFont(isSerif) {
  return currentLang === 'ko'
    ? (isSerif ? "'Noto Serif KR', serif"    : "'Noto Sans KR', sans-serif")
    : (isSerif ? "'Playfair Display', serif" : "'Inter', sans-serif");
}

function getLabel(key) {
  var em = emotions.find(function(e){ return e.key === key; });
  if (!em) return key;
  return currentLang === 'ko' ? em.ko : em.en;
}

function applyTheme(key) {
  var t = themes[key]; if (!t) return;
  var r = document.documentElement;
  document.body.style.background = t.bg;
  r.style.setProperty('--accent',  t.a);
  r.style.setProperty('--accent2', t.a2);
  r.style.setProperty('--accent3', t.a3);
  r.style.setProperty('--text',    t.t);
  r.style.setProperty('--muted',   t.m);
  r.style.setProperty('--surface', t.s);
  r.style.setProperty('--card',    t.c);
  r.style.setProperty('--border',  t.b);
  document.querySelectorAll('.api-section,.emotion-section,.upload-section').forEach(function(el){
    el.style.boxShadow = '0 4px 20px ' + t.a + '28';
  });
  document.getElementById('generateBtn').style.background =
    'linear-gradient(135deg, ' + t.a3 + ' 0%, ' + t.a + ' 100%)';
  var st = document.getElementById('storyText');
  st.style.fontFamily = getFont(t.serif);
  st.style.fontStyle  = t.fi;
}

function renderButtons() {
  var grid = document.getElementById('emotionGrid');
  grid.innerHTML = '';
  emotions.forEach(function(em) {
    var btn = document.createElement('button');
    btn.className = 'emotion-btn' + (selectedEmotion === em.key ? ' active' : '');
    btn.dataset.emotion = em.key;
    btn.innerHTML = currentLang === 'ko' ? em.ko : em.en;
    grid.appendChild(btn);
  });
}

function renderPreviews() {
  var grid = document.getElementById('previewGrid');
  var s = strings[currentLang];
  grid.innerHTML = '';
  uploadedImages.forEach(function(img, i) {
    var div = document.createElement('div');
    div.className = 'preview-item';
    div.innerHTML =
      '<img src="' + img.dataUrl + '" alt="' + s.imageAlt(i) + '" />' +
      '<div class="order-badge">' + (i+1) + '</div>' +
      '<button class="remove-btn" data-idx="' + i + '">✕</button>';
    grid.appendChild(div);
  });
  grid.querySelectorAll('.remove-btn').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      uploadedImages.splice(+btn.dataset.idx, 1);
      renderPreviews(); checkReady();
    });
  });
}

function renderUI() {
  var s = strings[currentLang];
  document.documentElement.lang = currentLang;
  document.title = currentLang === 'ko' ? '그림 이야기 생성기' : 'Picture Story Generator';
  document.body.style.fontFamily = s.bodyFont;
  document.getElementById('headerTitle').innerHTML   = s.title;
  document.getElementById('headerTitle').style.fontFamily = s.headerFont;
  document.getElementById('headerSubtitle').innerHTML = s.subtitle;
  document.getElementById('apiLabel').innerHTML      = s.apiLabel;
  document.getElementById('emotionSectionTitle').textContent = s.emotionTitle;
  document.getElementById('uploadSectionTitle').textContent  = s.uploadTitle;
  document.getElementById('uploadHint1').innerHTML   = s.uploadHint1;
  document.getElementById('uploadHint2').textContent = s.uploadHint2;
  document.getElementById('generateBtn').innerHTML   = s.generateBtn;
  document.getElementById('statusMsg').textContent   = s.loadingMsg;
  var ot = document.getElementById('outputTitle');
  ot.textContent     = s.outputTitle;
  ot.style.fontFamily = s.outputFont;
  if (selectedEmotion) {
    document.getElementById('emotionTag').innerHTML = getLabel(selectedEmotion);
    var th = themes[selectedEmotion];
    if (th) document.getElementById('storyText').style.fontFamily = getFont(th.serif);
  }
  document.querySelectorAll('.lang-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.lang === currentLang);
  });
  renderButtons(); renderPreviews(); checkReady();
}

function checkReady() {
  document.getElementById('generateBtn').disabled =
    !(selectedEmotion && uploadedImages.length >= 1 && document.getElementById('apiKey').value.trim());
}

document.querySelector('.lang-toggle').addEventListener('click', function(e) {
  var btn = e.target.closest('.lang-btn');
  if (!btn || btn.dataset.lang === currentLang) return;
  currentLang = btn.dataset.lang; renderUI();
});

document.getElementById('emotionGrid').addEventListener('click', function(e) {
  var btn = e.target.closest('.emotion-btn');
  if (!btn) return;
  document.querySelectorAll('.emotion-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  selectedEmotion = btn.dataset.emotion;
  applyTheme(selectedEmotion); checkReady();
});

var zone = document.getElementById('uploadZone');
var fi   = document.getElementById('fileInput');
zone.addEventListener('click',     function(){ fi.click(); });
zone.addEventListener('dragover',  function(e){ e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', function(){ zone.classList.remove('dragover'); });
zone.addEventListener('drop', function(e) {
  e.preventDefault(); zone.classList.remove('dragover');
  handleFiles(Array.from(e.dataTransfer.files));
});
fi.addEventListener('change', function(){ handleFiles(Array.from(fi.files)); });

function handleFiles(files) {
  files.filter(function(f){ return f.type.startsWith('image/'); }).forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      uploadedImages.push({file:file, dataUrl:ev.target.result});
      renderPreviews(); checkReady();
    };
    reader.readAsDataURL(file);
  });
}

document.getElementById('apiKey').addEventListener('input', checkReady);
document.getElementById('generateBtn').addEventListener('click', generateStory);

async function generateStory() {
  var apiKey = document.getElementById('apiKey').value.trim();
  var spinner = document.getElementById('spinner');
  var statusMsg = document.getElementById('statusMsg');
  var outputSection = document.getElementById('outputSection');
  var btn = document.getElementById('generateBtn');

  btn.disabled = true;
  outputSection.classList.remove('visible');
  spinner.classList.add('visible');
  statusMsg.classList.add('visible');

  try {
    var ic = [];
    uploadedImages.forEach(function(img, i) {
      var b64 = img.dataUrl.split(',')[1];
      var mt  = img.file.type || 'image/jpeg';
      ic.push({type:'text', text: currentLang==='ko' ? '그림 '+(i+1)+':' : 'Picture '+(i+1)+':'});
      ic.push({type:'image_url', image_url:{url:'data:'+mt+';base64,'+b64}});
    });

    var tone  = tones[selectedEmotion] && tones[selectedEmotion][currentLang]
                  ? tones[selectedEmotion][currentLang]
                  : 'Faithfully reflect the mood of "'+selectedEmotion+'".';
    var label = getLabel(selectedEmotion);

    var sp = currentLang==='ko'
      ? `당신은 창의적인 한국어 동화 작가입니다.
사용자가 제공한 여러 장의 그림을 순서대로 분석하세요.
각 그림 속 인물, 배경, 사물을 구체적으로 파악하여 이야기에 반영하세요.

선택된 감정: ${label}
어조 지침: ${tone}

위 감정과 어조를 바탕으로 그림들을 자연스럽게 연결하는 짧고 아름다운 이야기를 한국어로 작성하세요.
이야기는 그림의 순서에 따라 흐름이 이어져야 하며, 500~800자 분량으로 작성하세요.
결과물은 이야기 본문만 출력하고 별도의 설명이나 머리말은 생략하세요.`
      : `You are a creative English short-story writer.
Analyze the provided pictures in order.
Identify specific details (characters, setting, objects) and weave them into your story.

Selected emotion: ${label}
Tone guide: ${tone}

Write a short, beautiful English story connecting the pictures in sequence.
Approximately 150–250 words. Output only the story text.`;

    var ut = currentLang==='ko'
      ? '위 그림들을 순서대로 보고 "' + label + '" 감정으로 이야기를 써주세요.'
      : 'Please look at the pictures in order and write a story with the emotion "' + label + '".';

    var resp = await fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({
        model:'gpt-4o', max_tokens:1600,
        messages:[
          {role:'system', content:sp},
          {role:'user',   content:ic.concat([{type:'text',text:ut}])}
        ]
      })
    });

    if (!resp.ok) {
      var err = await resp.json();
      throw new Error(err.error && err.error.message ? err.error.message : 'API error: '+resp.status);
    }

    var data  = await resp.json();
    var story = data.choices[0].message.content.trim();
    document.getElementById('storyText').textContent  = story;
    document.getElementById('emotionTag').innerHTML   = label;
    document.getElementById('charCount').textContent  = strings[currentLang].count(story);
    outputSection.classList.add('visible');

  } catch(err) {
    alert(strings[currentLang].errorPrefix + err.message);
  } finally {
    spinner.classList.remove('visible');
    statusMsg.classList.remove('visible');
    btn.disabled = false;
    checkReady();
  }
}

renderUI();
</script>
</body>
